{% extends 'base.html' %}
{% block title %}Lỗi {{ code }} — HomeworkAI{% endblock %}
{% block content %}
<div class="error-page">
  <i class="fa-solid fa-triangle-exclamation error-code neon-red"></i>
  <div class="error-num neon-red">{{ code }}</div>
  <p class="error-msg">{{ msg }}</p>
  <a href="{{ url_for('index') }}" class="btn-primary">
    <i class="fa-solid fa-house"></i> Về trang chủ
  </a>
</div>
{% endblock %}
